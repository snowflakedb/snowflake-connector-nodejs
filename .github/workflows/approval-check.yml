# Requires PRs from non-snowflakedb org members to have at least 2 approvals.
# This prevents developers from self-approving their own PRs using a
# private/personal GitHub account.
#
# Checks ALL open PRs associated with the head commit to prevent bypass when
# two PRs (one internal, one external) share the same commit SHA.
name: Approval Check

on:
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-approvals:
    name: Require 2 approvals for external contributors
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SNOWFLAKE_GITHUB_TOKEN }}
          script: |
            const REQUIRED_APPROVALS = 2;
            const ORG = 'snowflakedb';
            const headSha = context.payload.pull_request.head.sha;

            async function isOrgMember(username) {
              try {
                const { status } = await github.rest.orgs.checkMembershipForUser({
                  org: ORG,
                  username,
                });
                return status === 204;
              } catch (error) {
                if (error.status === 404 || error.status === 302) {
                  return false;
                }
                throw error;
              }
            }

            async function getOrgApprovalCount(prNumber) {
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              const latestReviewByUser = new Map();
              for (const review of reviews) {
                latestReviewByUser.set(review.user.login, review.state);
              }

              const approvers = [...latestReviewByUser.entries()]
                .filter(([, state]) => state === 'APPROVED')
                .map(([login]) => login);

              const orgApprovers = [];
              for (const login of approvers) {
                if (await isOrgMember(login)) {
                  orgApprovers.push(login);
                }
              }
              return orgApprovers.length;
            }

            const { data: associatedPRs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: headSha,
            });

            const openPRs = associatedPRs.filter(pr => pr.state === 'open');

            const failingPRs = [];
            for (const pr of openPRs) {
              if (await isOrgMember(pr.user.login)) {
                core.info(`Skipping PR #${pr.number} — author @${pr.user.login} is an org member`);
                continue;
              }
              const approvalCount = await getOrgApprovalCount(pr.number);
              if (approvalCount < REQUIRED_APPROVALS) {
                failingPRs.push({ number: pr.number, approvalCount });
              }
            }

            if (failingPRs.length > 0) {
              const details = failingPRs
                .map(p => `PR #${p.number} has ${p.approvalCount}/${REQUIRED_APPROVALS}`)
                .join(', ');
              core.setFailed(`Insufficient org approvals: ${details}`);
            }
